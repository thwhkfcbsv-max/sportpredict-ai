services:
  - type: web
    name: sportpredict-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    envVars:
      - key: FOOTBALL_API_KEY
        sync: false
      - key: MMA_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
